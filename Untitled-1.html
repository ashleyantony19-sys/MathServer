<!DOCTYPE html>
<html>
<head>
    <title>GST Bill Calculator</title>
    <style>
        body{
            font-family: Arial;
            background-color:pink;
        }
        .box{
            width:350px;
            margin:100px auto;
            background:purple;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 0px 10px gray;
        }
        input{
            padding:8px;
            width:150px;
        }
        button{
            padding:8px 15px;
            background:green;
            color:white;
            border:none;
        }
    </style>
</head>

<body>

<div class="box">

<h2>GST Bill Calculator</h2>

<form method="post">
{% csrf_token %}

<table align="center">

<tr>
<td>Price</td>
<td><input type="number" name="price" required></td>
</tr>

<tr>
<td>GST</td>
<td><input type="number" name="gst" required></td>
</tr>

<tr>
<td colspan="2">
<button type="submit">Calculate</button>
</td>
</tr>

</table>

</form>

<h3>Total Bill Amount = ₹ {{ total }}</h3>

</div>

</body>
</html>
